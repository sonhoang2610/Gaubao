<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAUBAO - Bánh Bao Cao Cấp</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- EmailJS: gửi email đơn hàng từ trình duyệt -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #c2410c; }
    ::selection { background-color: #fed7aa; color: #7c2d12; }
    @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  </style>
</head>
<body class="bg-[#FFFBF5]">
  <div id="root"></div>

  <!-- Dữ liệu & lớp lưu trữ (JS thường) -->
  <script src="app/seed.js"></script>
  <script src="app/store.js"></script>
  <script src="app/email.js"></script>

  <!-- Components (Babel) -->
  <script type="text/babel" src="app/public.jsx"></script>
  <script type="text/babel" src="app/admin.jsx"></script>

  <!-- App chính -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function GauBaoApp() {
      const S = window.GauBaoStore;
      const [data, setData] = useState(() => S.loadData());

      // Giỏ hàng & luồng đặt hàng
      const [cartItems, setCartItems] = useState([]);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [isCheckout, setIsCheckout] = useState(false);
      const [isSuccess, setIsSuccess] = useState(false);
      const [animations, setAnimations] = useState([]);

      // Thông tin khách & trạng thái gửi đơn
      const [customer, setCustomer] = useState({ name: '', phone: '', email: '', address: '', note: '' });
      const [sending, setSending] = useState(false);
      const [lastOrder, setLastOrder] = useState(null);
      const [sendNotice, setSendNotice] = useState('');
      const setCust = (k, v) => setCustomer((c) => ({ ...c, [k]: v }));

      // Cổng admin
      const [showLogin, setShowLogin] = useState(false);
      const [showAdmin, setShowAdmin] = useState(false);
      const clickCount = useRef(0);
      const clickTimer = useRef(null);

      // --- Thao tác bí mật: bấm logo 5 lần liên tiếp ---
      const handleLogoClick = () => {
        // reset cũng cuộn lên đầu như logo gốc
        if (!isCheckout && !isSuccess) window.scrollTo(0, 0);
        setIsCheckout(false);
        setIsSuccess(false);

        clickCount.current += 1;
        clearTimeout(clickTimer.current);
        if (clickCount.current >= 5) {
          clickCount.current = 0;
          setShowLogin(true);
        } else {
          // reset bộ đếm nếu ngừng bấm quá 1.2s
          clickTimer.current = setTimeout(() => { clickCount.current = 0; }, 1200);
        }
      };

      const commitData = (newData) => {
        const res = S.saveData(newData);
        setData(S.clone(newData));

        // Đồng bộ toàn bộ config lên Google Sheet
        const sheetCfg = newData.sheet || {};
        if (sheetCfg.enabled && sheetCfg.endpoint) {
          const configToSync = {
            stores: newData.stores,
            contact: newData.contact,
            email: newData.email,
          };
          window.GauBaoEmail.saveConfigToSheet(sheetCfg.endpoint, configToSync)
            .then(() => console.log('✓ Đã đồng bộ config lên Google Sheet.'))
            .catch((err) => console.warn('Không đồng bộ config được:', err));
        }

        return res;
      };

      // Khi mở trang: thử đọc config (cơ sở, liên hệ) từ Google Sheet
      useEffect(() => {
        const sheetCfg = data.sheet || {};
        if (!sheetCfg.enabled || !sheetCfg.endpoint) return;
        window.GauBaoEmail.loadConfigFromSheet(sheetCfg.endpoint)
          .then((remote) => {
            if (!remote) return;
            setData((prev) => {
              const merged = {
                ...prev,
                stores: Array.isArray(remote.stores) && remote.stores.length ? remote.stores : prev.stores,
                contact: remote.contact && remote.contact.phone ? { ...prev.contact, ...remote.contact } : prev.contact,
                email: remote.email ? { ...prev.email, ...remote.email } : prev.email,
              };
              S.saveData(merged);
              return merged;
            });
            console.log('✓ Đã đồng bộ config từ Google Sheet.');
          })
          .catch((err) => console.warn('Không đọc config từ Sheet:', err));
      }, []);

      const totalCartItems = cartItems.reduce((t, i) => t + i.quantity, 0);
      const totalCartPrice = cartItems.reduce((t, i) => t + i.price * i.quantity, 0);

      const handleAddToCart = (product, event) => {
        setCartItems((prev) => {
          const existing = prev.find((i) => i.id === product.id);
          if (existing) return prev.map((i) => (i.id === product.id ? { ...i, quantity: i.quantity + 1 } : i));
          return [...prev, { ...product, quantity: 1 }];
        });
        const rect = event.currentTarget.getBoundingClientRect();
        const animId = Date.now();
        setAnimations((prev) => [...prev, { id: animId, startX: rect.left, startY: rect.top, img: product.img }]);
        setTimeout(() => setAnimations((prev) => prev.filter((a) => a.id !== animId)), 800);
      };

      const updateQuantity = (id, delta) => setCartItems((prev) => prev.map((i) => (i.id === id ? { ...i, quantity: Math.max(1, i.quantity + delta) } : i)));
      const removeItem = (id) => setCartItems((prev) => prev.filter((i) => i.id !== id));

      const handleCheckoutSubmit = async (e) => {
        e.preventDefault();
        if (sending) return;
        const E = window.GauBaoEmail;
        const order = {
          code: E.genOrderCode(),
          time: E.nowString(),
          customer: { ...customer },
          items: cartItems,
          total: totalCartPrice,
          shopName: 'GAUBAO',
          shopPhone: data.contact.phone,
        };

        const emailCfg = data.email || {};
        const canSendEmail = emailCfg.enabled && emailCfg.publicKey && emailCfg.serviceId;

        if (canSendEmail) {
          setSending(true);
          setSendNotice('');
          try {
            await E.sendOrderEmails(emailCfg, order);
            setSendNotice('ok');
          } catch (err) {
            console.error('Gửi email thất bại:', err);
            setSendNotice('error');
          } finally {
            setSending(false);
          }
        } else {
          setSendNotice('off');
        }

        setLastOrder(order);
        setIsCheckout(false);
        setIsSuccess(true);
        setCartItems([]);
        window.scrollTo(0, 0);
      };

      const resetAfterSuccess = () => {
        setIsSuccess(false);
        setCustomer({ name: '', phone: '', email: '', address: '', note: '' });
        setLastOrder(null);
        setSendNotice('');
      };

      return (
        <div className="min-h-screen bg-[#FFFBF5] font-sans text-stone-800 relative">
          <ContactHUD contact={data.contact} />
          {animations.map((anim) => <FlyingImage key={anim.id} anim={anim} />)}

          <PublicHeader
            contact={data.contact}
            cartCount={totalCartItems}
            onCartOpen={() => setIsCartOpen(true)}
            onLogoClick={handleLogoClick}
            isPlain={isCheckout || isSuccess}
          />

          <CartSidebar
            open={isCartOpen}
            items={cartItems}
            totalPrice={totalCartPrice}
            onClose={() => setIsCartOpen(false)}
            updateQuantity={updateQuantity}
            removeItem={removeItem}
            onCheckout={() => { setIsCartOpen(false); setIsCheckout(true); window.scrollTo(0, 0); }}
          />

          {isSuccess ? (
            <main className="pt-32 pb-20 px-4 min-h-screen flex items-center justify-center">
              <div className="bg-white rounded-3xl p-8 md:p-10 max-w-md w-full text-center shadow-xl border border-orange-100">
                <div className="w-20 h-20 rounded-full bg-green-50 flex items-center justify-center mx-auto mb-6">
                  <i className="fas fa-check-circle text-[52px] text-green-500 animate-bounce"></i>
                </div>
                <h2 className="text-3xl font-black text-stone-800 mb-2">Đặt Hàng Thành Công!</h2>
                <p className="text-stone-500 mb-6">Cảm ơn bạn đã lựa chọn GAUBAO. Chúng tôi sẽ gọi lại ngay để xác nhận đơn hàng!</p>

                {lastOrder && (
                  <div className="bg-orange-50 rounded-2xl p-4 mb-5 text-left border border-orange-100">
                    <div className="flex items-center justify-between mb-2">
                      <span className="text-xs font-bold text-stone-400 uppercase tracking-wide">Mã đơn hàng</span>
                      <span className="font-black text-orange-600 tracking-wider">{lastOrder.code}</span>
                    </div>
                    <div className="flex items-center justify-between">
                      <span className="text-xs font-bold text-stone-400 uppercase tracking-wide">Tổng cộng</span>
                      <span className="font-black text-stone-800">{lastOrder.total.toLocaleString('vi-VN')}đ</span>
                    </div>
                  </div>
                )}

                {sendNotice === 'ok' && (
                  <p className="text-sm text-green-600 font-medium mb-5 flex items-center justify-center gap-2"><i className="fas fa-paper-plane"></i> Đã gửi email xác nhận cho bạn{lastOrder && lastOrder.customer.email ? ` (${lastOrder.customer.email})` : ''}.</p>
                )}
                {sendNotice === 'error' && (
                  <p className="text-sm text-amber-600 font-medium mb-5 flex items-center justify-center gap-2"><i className="fas fa-triangle-exclamation"></i> Đơn đã ghi nhận, nhưng gửi email chưa thành công. Vui lòng kiểm tra cấu hình EmailJS.</p>
                )}
                <button onClick={resetAfterSuccess} className="bg-orange-600 text-white px-8 py-3 rounded-full font-bold hover:bg-orange-700 transition w-full">Tiếp tục mua sắm</button>
              </div>
            </main>
          ) : isCheckout ? (
            <main className="pt-28 pb-20 px-4 max-w-7xl mx-auto min-h-screen">
              <button onClick={() => setIsCheckout(false)} className="flex items-center text-gray-500 hover:text-orange-600 font-medium mb-6 transition"><i className="fas fa-arrow-left text-[18px] mr-2"></i> Quay lại chọn món</button>
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div className="lg:col-span-7 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100">
                  <h2 className="text-2xl font-black mb-6 flex items-center gap-2"><i className="fas fa-truck text-[20px] text-orange-600"></i> Thông tin giao hàng</h2>
                  <form onSubmit={handleCheckoutSubmit} className="space-y-5">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                      <div>
                        <label className="block text-sm font-semibold text-stone-700 mb-2">Họ và Tên *</label>
                        <div className="relative">
                          <i className="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 text-[15px]"></i>
                          <input required type="text" value={customer.name} onChange={(e) => setCust('name', e.target.value)} placeholder="VD: Nguyễn Văn A" className="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 bg-gray-50/50 transition" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-stone-700 mb-2">Số điện thoại *</label>
                        <div className="relative">
                          <i className="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 text-[15px]"></i>
                          <input required type="tel" value={customer.phone} onChange={(e) => setCust('phone', e.target.value)} placeholder="098 123 4567" className="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 bg-gray-50/50 transition" />
                        </div>
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-stone-700 mb-2">Email nhận xác nhận đơn *</label>
                      <div className="relative">
                        <i className="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 text-[15px]"></i>
                        <input required type="email" value={customer.email} onChange={(e) => setCust('email', e.target.value)} placeholder="email@cuaban.com" className="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 bg-gray-50/50 transition" />
                      </div>
                      <p className="text-xs text-stone-400 mt-1.5 flex items-center gap-1.5"><i className="fas fa-circle-info"></i> Chúng tôi sẽ gửi email xác nhận đơn hàng tới địa chỉ này.</p>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-stone-700 mb-2">Địa chỉ nhận hàng *</label>
                      <div className="relative">
                        <i className="fas fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 text-[15px]"></i>
                        <input required type="text" value={customer.address} onChange={(e) => setCust('address', e.target.value)} placeholder="Số nhà, Tên đường, Quận/Huyện..." className="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 bg-gray-50/50 transition" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-stone-700 mb-2">Ghi chú cho quán (Tùy chọn)</label>
                      <textarea rows="3" value={customer.note} onChange={(e) => setCust('note', e.target.value)} placeholder="Ví dụ: Xin thêm tương ớt..." className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 bg-gray-50/50 resize-none transition"></textarea>
                    </div>
                    <button type="submit" disabled={sending} className="w-full bg-stone-900 text-white font-bold text-lg py-4 rounded-xl hover:bg-black transition shadow-lg mt-4 hidden lg:flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
                      {sending ? (<><i className="fas fa-spinner fa-spin"></i> Đang gửi đơn...</>) : (<><i className="fas fa-circle-check"></i> Xác Nhận Đơn Hàng</>)}
                    </button>
                  </form>
                </div>
                <div className="lg:col-span-5 bg-orange-50 p-6 md:p-8 rounded-3xl border border-orange-100 h-fit sticky top-28">
                  <h2 className="text-xl font-bold mb-6">Đơn hàng của bạn ({totalCartItems} món)</h2>
                  <div className="space-y-4 mb-6 max-h-[40vh] overflow-y-auto pr-2">
                    {cartItems.map((item) => (
                      <div key={item.id} className="flex justify-between items-center text-sm font-medium">
                        <div className="flex items-center gap-3 flex-1"><span className="w-6 h-6 rounded-full bg-orange-200 text-orange-800 flex items-center justify-center text-xs flex-shrink-0">{item.quantity}</span><span className="text-stone-700 pr-2 line-clamp-1">{item.name}</span></div>
                        <span className="text-stone-900 whitespace-nowrap">{(item.price * item.quantity).toLocaleString('vi-VN')}đ</span>
                      </div>
                    ))}
                  </div>
                  <div className="border-t border-orange-200 pt-4 space-y-3 mb-6">
                    <div className="flex justify-between text-stone-500 text-sm"><span>Tạm tính</span><span>{totalCartPrice.toLocaleString('vi-VN')}đ</span></div>
                    <div className="flex justify-between text-stone-500 text-sm"><span>Phí giao hàng</span><span className="text-green-600 font-semibold">Liên hệ</span></div>
                    <div className="flex justify-between font-black text-xl pt-2 border-t border-orange-200 mt-2"><span>Tổng cộng</span><span className="text-orange-600">{totalCartPrice.toLocaleString('vi-VN')}đ</span></div>
                  </div>
                  <button onClick={(e) => { const form = document.querySelector('form'); if (form.checkValidity()) handleCheckoutSubmit(e); else form.reportValidity(); }} disabled={sending} className="w-full bg-stone-900 text-white font-bold text-lg py-4 rounded-xl hover:bg-black transition shadow-lg lg:hidden flex items-center justify-center gap-2 disabled:opacity-60">
                    {sending ? (<><i className="fas fa-spinner fa-spin"></i> Đang gửi...</>) : 'Xác Nhận Đơn Hàng'}
                  </button>
                </div>
              </div>
            </main>
          ) : (
            <>
              <Hero hero={data.hero} banners={data.banners} />
              <Menu products={data.products} onAddToCart={handleAddToCart} />
              <Footer stores={data.stores} />
            </>
          )}

          {showLogin && (
            <LoginModal
              onSuccess={() => { setShowLogin(false); setShowAdmin(true); }}
              onClose={() => setShowLogin(false)}
            />
          )}

          {showAdmin && (
            <AdminPanel
              data={data}
              onCommit={commitData}
              onClose={() => setShowAdmin(false)}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GauBaoApp />);
  </script>
</body>
</html>
